# configs/default.yaml
# ---------------------
# Default pipeline configuration. CLI override possible for any field,
# e.g.: python train_dp.py --config configs/default.yaml --epsilon 2

# --- Data ---
data_root: "../cifar10"
cifar10_url: "https://s3.amazonaws.com/fast-ai-imageclas/cifar10.tgz"

# --- Common hyperparameters (baseline + DP) ---
epochs: 10
lr: 0.001
batch_size: 128
seed: 42

# --- DP-SGD hyperparameters ---
epsilon: 10.0
delta: 1.0e-8
max_grad_norm: 1.2
max_physical_batch_size: 32
accountant: "rdp"

# --- CKA ---
cka_batch_size: 256
cka_num_batches: 30
cka_kernel: "linear"   # "linear" or "gaussian"
cka_layers:
  - conv1
  - bn1
  - layer1.0.conv1
  - layer1.0.bn1
  - layer1.0.conv2
  - layer1.0.bn2
  - layer1.1.conv1
  - layer1.1.bn1
  - layer1.1.conv2
  - layer1.1.bn2
  - layer2.0.conv1
  - layer2.0.bn1
  - layer2.0.conv2
  - layer2.0.bn2
  - layer2.0.downsample.0
  - layer2.0.downsample.1
  - layer2.1.conv1
  - layer2.1.bn1
  - layer2.1.conv2
  - layer2.1.bn2
  - layer3.0.conv1
  - layer3.0.bn1
  - layer3.0.conv2
  - layer3.0.bn2
  - layer3.0.downsample.0
  - layer3.0.downsample.1
  - layer3.1.conv1
  - layer3.1.bn1
  - layer3.1.conv2
  - layer3.1.bn2
  - layer4.0.conv1
  - layer4.0.bn1
  - layer4.0.conv2
  - layer4.0.bn2
  - layer4.0.downsample.0
  - layer4.0.downsample.1
  - layer4.1.conv1
  - layer4.1.bn1
  - layer4.1.conv2
  - layer4.1.bn2
  - fc

# --- Outputs ---
networks_dir: "../networks"
results_dir: "../results"
logs_dir: "../logs"

# --- Misc ---
num_classes: 10